name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check potmill
      - run: ruff format --check potmill

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pip-installable test deps only (no Flux / LAMMPS / FitSNAP / jax needed for the unit tests).
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install numpy scipy pandas ase
      - run: pip install -e . --no-deps
      - run: python -m unittest discover -s tests -v
